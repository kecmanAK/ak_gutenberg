name: Build Release ZIP

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    env:
      PLUGIN_SLUG: ak-gutenberg-custom-blocks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          mkdir -p dist/"${PLUGIN_SLUG}"
          rsync -av ./ dist/"${PLUGIN_SLUG}"/ --exclude-from=.distignore
          cd dist
          zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_SLUG }}
          path: dist/${{ env.PLUGIN_SLUG }}.zip

      - name: Attach ZIP to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/${PLUGIN_SLUG}.zip" --clobber
